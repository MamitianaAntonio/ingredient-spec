openapi : 3.0.3
info :
  title: Ingredient specification OSA
  description: TD5 part 2 - ingredient specification
  version: 1.0.0
servers:
  - url : http://localhost:8080
paths:
  /ingredients:
    get:
      summary: List of all ingredients
      responses:
        '200':
          description: Get all ingredients success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'
  /ingredients/{id}:
    get:
      summary: Get ingredient by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Get an ingredient success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'
        '404':
          description: Ingredient not found
          content:
            text/plain:
              schema:
                type: string
                example: "Ingredient.id={id} is not found"
  /ingredients/{id}/stock:
    get:
      summary: Get ingredient stock by id at a given time and unit
      parameters:
      - name: id
        in: path
        required: true
        description: Ingredient ID
        schema:
          type: integer

      - name: at
        in: query
        required: true
        description: Temporal reference to get stock value
        schema:
          type: string

      - name: unit
        in: query
        required: true
        description: Unit reference (PCS, KG, L)
        schema:
          type: string
      responses:
        '200':
          description: Stock value retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngredientStock'
        '404':
          description: Ingredient not found
          content:
            text/plain:
              schema:
                type: string
                example: "Ingredient.id={id} is not found"
        '400':
          description: Missing required query parameters
          content:
            text/plain:
              schema:
                type: string
                example: "Either mandatory query parameter `at` or `unit` is not provided."
  /dishes:
    get:
      summary: Get all dishes
      description: Returns all dishes stored in the database with their ingredients
      responses:
        '200':
          description: List of dishes retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dish'
  /dishes/{id}/ingredients:
    put:
      summary: Update ingredients of a dish (attach/detach)
      description: Associate or dissociate a list of ingredients to a dish
      parameters:
        - name: id
          in: path
          required: true
          description: Dish ID
          schema:
            type: integer
      requestBody:
        required: true
        description: List of ingredients to associate/dissociate
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Ingredient'
      responses:
        '200':
          description: Dish ingredients updated successfully
        '400':
          description: Missing request body
          content:
            text/plain:
              schema:
                type: string
                example: "Request body is required"
        '404':
          description: Dish not found
          content:
            text/plain:
              schema:
                type: string
                example: "Dish.id={id} is not found"

components:
  schemas:
    Ingredient:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        price:
          type: number
    IngredientStock:
      type: object
      properties:
        unit:
          type: string
          enum: [PCS, KG, L]
        value:
          type: number
    Dish:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        sellingPrice:
          type: number
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/Ingredient'