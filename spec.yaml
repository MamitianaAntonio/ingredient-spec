openapi : 3.0.3
info :
  title: Ingredient specification OSA
  description: TD5 part 2 - ingredient specification
  version: 1.0.0
servers:
  - url : http://localhost:8080
paths:
  /ingredients:
    get:
      summary: List of all ingredients
      responses:
        '200':
          description: Get all ingredients success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'
  /ingredients/{id}:
    get:
      summary: Get ingredient by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Get an ingredient success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'
        '404':
          description: Ingredient not found
          content:
            text/plain:
              schema:
                type: string
                example: "Ingredient.id={id} is not found"

components:
  schemas:
    Ingredient:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        price:
          type: number